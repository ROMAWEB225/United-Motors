<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title> NTR HUB </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* ========== VARIABLES THÈME CLAIR ========== */
    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --text: #1a202c;
      --text-light: #4a5568;
      --border: #e2e8f0;
      --header-bg: #1a365d;
      --header-text: #ffffff;
      --primary: #ed8936;
      --primary-hover: #dd6b20;
      --primary-light: #fbd38d;
      --shadow: rgba(0,0,0,0.08);
      --card-hover: #ebf8ff;
      --badge-bg: #edf2f7;
      --alert-bg: #fef3c7;
      --alert-text: #92400e;
      --success: #48bb78;
      --danger: #fc8181;
      --warning: #f6ad55;
      --info: #63b3ed;
    }

    /* ========== THÈME SOMBRE ========== */
    [data-theme="dark"] {
      --bg: #1a202c;
      --card-bg: #2d3748;
      --text: #e2e8f0;
      --text-light: #a0aec0;
      --border: #4a5568;
      --header-bg: #0d1a2b;
      --header-text: #e2e8f0;
      --primary: #ed8936;
      --primary-hover: #dd6b20;
      --primary-light: #744210;
      --shadow: rgba(0,0,0,0.4);
      --card-hover: #4a5568;
      --badge-bg: #4a5568;
      --alert-bg: #744210;
      --alert-text: #fef3c7;
      --success: #48bb78;
      --danger: #fc8181;
      --warning: #f6ad55;
      --info: #63b3ed;
    }

    /* ========== STYLES GÉNÉRAUX ========== */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    header {
      background: var(--header-bg);
      color: var(--header-text);
      padding:1rem 2rem;
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:1rem;
      align-items:center;
    }
    header h1 { font-size:1.5rem; display:flex; align-items:center; gap:0.5rem; }
    header h1 span { font-weight:300; font-size:0.9rem; opacity:0.8; }
    .btn {
      background: var(--primary);
      border:none;
      padding:0.5rem 1rem;
      border-radius:30px;
      color:#1a202c;
      font-weight:bold;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:0.5rem;
      transition:0.2s;
      font-size:0.9rem;
    }
    .btn:hover { background: var(--primary-hover); transform:scale(1.02); }
    .btn-green { background:#38a169; color:white; }
    .btn-green:hover { background:#2f855a; }
    .btn-red { background:#e53e3e; color:white; }
    .btn-red:hover { background:#c53030; }
    .btn-outline { background:var(--badge-bg); color:var(--text); }
    .btn-outline:hover { background:var(--border); }
    .btn-sm { padding:0.3rem 0.8rem; font-size:0.8rem; }

    .tabs {
      display:flex;
      gap:0.5rem;
      background:var(--card-bg);
      padding:0.5rem 1.5rem 0 1.5rem;
      border-bottom:2px solid var(--border);
    }
    .tab {
      background:none;
      border:none;
      padding:0.8rem 1.5rem;
      font-weight:bold;
      cursor:pointer;
      color:var(--text-light);
      transition:0.2s;
      border-bottom:3px solid transparent;
    }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--primary); border-bottom-color:var(--primary); }

    .dashboard {
      display:flex;
      flex-wrap:wrap;
      gap:1.5rem;
      padding:1.5rem;
      min-height:calc(100vh - 130px);
    }
    .panel {
      background:var(--card-bg);
      border-radius:24px;
      box-shadow:0 4px 12px var(--shadow);
      padding:1rem;
      overflow-y:auto;
      transition:background 0.3s;
    }
    .panel-list { flex:1.2; min-width:260px; height:calc(100vh - 130px); }
    .panel-detail { flex:3; min-width:320px; height:calc(100vh - 130px); }
    .panel-dashboard { width:100%; padding:1.5rem; }

    .search {
      display:flex;
      gap:0.5rem;
      flex-wrap:wrap;
      margin-bottom:1rem;
    }
    .search input, .search select {
      flex:1;
      padding:0.5rem;
      border:1px solid var(--border);
      border-radius:20px;
      background:var(--bg);
      color:var(--text);
    }

    .vehicles { display:flex; flex-direction:column; gap:0.75rem; }
    .card {
      background:var(--card-bg);
      border-left:5px solid var(--primary);
      padding:0.8rem;
      border-radius:16px;
      cursor:pointer;
      transition:0.2s;
      border:1px solid transparent;
    }
    .card:hover { background:var(--card-hover); }
    .card.selected { background:var(--card-hover); border-left-color:#1e3c72; border-color:var(--primary); }
    .card h4 { margin-bottom:0.2rem; }
    .card p { font-size:0.8rem; color:var(--text-light); }
    .badge {
      display:inline-block;
      background:var(--badge-bg);
      padding:0.2rem 0.5rem;
      border-radius:20px;
      font-size:0.7rem;
      margin-top:0.3rem;
      color:var(--text);
    }
    .badge-alert {
      background:var(--alert-bg);
      color:var(--alert-text);
    }

    .form-group { margin-bottom:1rem; }
    .form-group label { font-weight:600; display:block; margin-bottom:0.3rem; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%;
      padding:0.5rem;
      border:1px solid var(--border);
      border-radius:12px;
      font-family:inherit;
      background:var(--bg);
      color:var(--text);
    }
    .row { display:flex; gap:1rem; flex-wrap:wrap; }
    .row .form-group { flex:1; margin-bottom:0; }
    .checkbox-group { display:flex; flex-wrap:wrap; gap:0.8rem; margin-top:0.3rem; }
    .checkbox-group label { display:flex; align-items:center; gap:0.3rem; font-weight:normal; }
    .map-container { height:220px; border-radius:16px; margin:0.5rem 0; background:var(--bg); }
    .photo-preview { display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.3rem; }
    .photo-preview img { width:70px; height:70px; object-fit:cover; border-radius:8px; }

    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
    .modal-content { background:var(--card-bg); border-radius:24px; padding:1.5rem; max-width:550px; width:90%; position:relative; max-height:90vh; overflow-y:auto; }
    .close { position:absolute; right:1rem; top:0.5rem; font-size:1.8rem; cursor:pointer; color:var(--text); }
    .placeholder { text-align:center; margin-top:3rem; color:var(--text-light); }
    .action-buttons { display:flex; gap:0.8rem; justify-content:flex-end; margin-top:1rem; flex-wrap:wrap; }

    .theme-toggle {
      background:none;
      border:none;
      color:var(--header-text);
      font-size:1.2rem;
      cursor:pointer;
      padding:0.3rem 0.8rem;
    }

    .tab-content {
      display:none;
      width:100%;
      flex-wrap:wrap;
      gap:1.5rem;
    }
    .tab-content.active {
      display:flex;
    }

    @media(max-width:700px){ .dashboard{flex-direction:column;} .panel-list,.panel-detail{height:auto;max-height:50vh;} }

    .pdf-header { text-align:center; margin-bottom:10px; }
    .pdf-header h2 { color:#1e3c72; }
    .pdf-table { width:100%; border-collapse:collapse; font-size:8pt; font-family:'Segoe UI', Arial, sans-serif; }
    .pdf-table th,.pdf-table td { border:1px solid #aaa; padding:4px 3px; vertical-align:top; text-align:left; }
    .pdf-table th { background:#1e3c72; color:white; }
    .pdf-table tr:nth-child(even) { background:#f9f9f9; }

    /* ========== STYLES TABLEAU DE BORD AMÉLIORÉ ========== */
    .dashboard-stats {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
      gap:1rem;
      margin-bottom:1.5rem;
    }
    .stat-card-clickable {
      background:var(--card-bg);
      border-radius:16px;
      padding:1.2rem 1rem;
      text-align:center;
      box-shadow:0 2px 8px var(--shadow);
      cursor:pointer;
      transition:0.2s;
      border:2px solid transparent;
      position:relative;
    }
    .stat-card-clickable:hover {
      transform:translateY(-4px);
      border-color:var(--primary);
      box-shadow:0 8px 20px var(--shadow);
    }
    .stat-card-clickable .stat-icon {
      font-size:2rem;
      margin-bottom:0.3rem;
      display:block;
    }
    .stat-card-clickable .stat-number {
      font-size:2.2rem;
      font-weight:bold;
      display:block;
      line-height:1.2;
    }
    .stat-card-clickable .stat-label {
      font-size:0.85rem;
      color:var(--text-light);
      margin-top:0.2rem;
      display:block;
    }
    .stat-card-clickable .stat-sub {
      font-size:0.7rem;
      color:var(--text-light);
      margin-top:0.3rem;
      opacity:0.7;
    }
    .stat-card-clickable .stat-badge {
      position:absolute;
      top:-8px;
      right:-8px;
      background:var(--danger);
      color:white;
      border-radius:50%;
      width:28px;
      height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:0.7rem;
      font-weight:bold;
    }

    .dashboard-charts {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:1.5rem;
      margin-bottom:1.5rem;
    }
    @media(max-width:800px){ .dashboard-charts { grid-template-columns:1fr; } }

    .chart-box {
      background:var(--card-bg);
      border-radius:16px;
      padding:1.2rem;
      box-shadow:0 2px 8px var(--shadow);
    }
    .chart-box h4 {
      margin-bottom:0.8rem;
      color:var(--text);
      font-size:0.95rem;
      display:flex;
      align-items:center;
      gap:0.5rem;
    }
    .chart-bar-container {
      display:flex;
      flex-direction:column;
      gap:0.5rem;
    }
    .chart-bar-row {
      display:flex;
      align-items:center;
      gap:0.8rem;
    }
    .chart-bar-label {
      min-width:100px;
      font-size:0.8rem;
      color:var(--text-light);
      text-align:right;
    }
    .chart-bar-track {
      flex:1;
      height:24px;
      background:var(--bg);
      border-radius:12px;
      overflow:hidden;
      position:relative;
    }
    .chart-bar-fill {
      height:100%;
      border-radius:12px;
      transition:width 0.8s ease;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding-right:8px;
      font-size:0.7rem;
      font-weight:bold;
      color:white;
      min-width:30px;
    }
    .chart-bar-fill.orange { background:linear-gradient(90deg,#ed8936,#dd6b20); }
    .chart-bar-fill.blue { background:linear-gradient(90deg,#4299e1,#3182ce); }
    .chart-bar-fill.green { background:linear-gradient(90deg,#48bb78,#38a169); }
    .chart-bar-fill.red { background:linear-gradient(90deg,#fc8181,#e53e3e); }
    .chart-bar-fill.purple { background:linear-gradient(90deg,#9f7aea,#805ad5); }

    .dashboard-actions {
      display:flex;
      gap:0.8rem;
      flex-wrap:wrap;
      margin-top:0.5rem;
    }
    .dashboard-actions .btn {
      flex:1;
      min-width:150px;
      justify-content:center;
    }

    .timeline-compact {
      max-height:250px;
      overflow-y:auto;
    }
    .timeline-compact .item {
      display:flex;
      justify-content:space-between;
      padding:0.5rem 0;
      border-bottom:1px solid var(--border);
      font-size:0.85rem;
    }
    .timeline-compact .item .date { color:var(--text-light); }
    .timeline-compact .item .label { font-weight:500; }

    .status-dot {
      display:inline-block;
      width:10px;
      height:10px;
      border-radius:50%;
      margin-right:6px;
    }
    .status-dot.receptionne { background:#ed8936; }
    .status-dot.diagnostic { background:#4299e1; }
    .status-dot.livre { background:#48bb78; }
  </style>
</head>
<body>
<header>
  <h1><i class="fas fa-truck-moving"></i> NTR HUB <span>Pro</span></h1>
  <div style="display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;">
    <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
    <button id="excelBtn" class="btn btn-green"><i class="fas fa-file-excel"></i> Excel</button>
    <button id="pdfBtn" class="btn btn-red"><i class="fas fa-file-pdf"></i> PDF</button>
    <button id="backupBtn" class="btn btn-outline"><i class="fas fa-download"></i> Sauvegarder</button>
    <button id="restoreBtn" class="btn btn-outline"><i class="fas fa-upload"></i> Restaurer</button>
    <button id="importBtn" class="btn btn-outline"><i class="fas fa-file-import"></i> Importer</button>
    <button id="addBtn" class="btn"><i class="fas fa-plus"></i> Nouveau</button>
  </div>
</header>
<div class="tabs">
  <button class="tab active" data-tab="list">📋 Liste & Détail</button>
  <button class="tab" data-tab="dashboard">📊 Tableau de bord</button>
</div>

<main class="dashboard" id="mainContainer">
  <!-- Onglet Liste -->
  <div id="tab-list" class="tab-content active">
    <div class="panel panel-list">
      <div class="search">
        <input id="searchInput" placeholder="🔍 Plaque, client, société...">
        <select id="societyFilter"><option value="all">Toutes sociétés</option></select>
        <select id="statusFilter">
          <option value="all">Tous statuts</option>
          <option>Réceptionné</option>
          <option>Diagnostic en cours</option>
          <option>Livré</option>
        </select>
      </div>
      <div id="vehiclesList" class="vehicles">Chargement...</div>
    </div>
    <div class="panel panel-detail">
      <div id="placeholder" class="placeholder"><i class="fas fa-car-side"></i><p>Sélectionnez un véhicule</p></div>
      <div id="detailForm" style="display:none;"></div>
    </div>
  </div>

  <!-- Onglet Tableau de bord -->
  <div id="tab-dashboard" class="tab-content">
    <div class="panel panel-dashboard">
      <div class="dashboard-stats" id="statsContainer"></div>
      <div class="dashboard-charts">
        <div class="chart-box" id="chartStatusContainer">
          <h4><i class="fas fa-chart-bar" style="color:var(--primary);"></i> Répartition par statut</h4>
          <div class="chart-bar-container" id="statusBars"></div>
        </div>
        <div class="chart-box">
          <h4><i class="fas fa-clock" style="color:var(--info);"></i> Dernières activités</h4>
          <div class="timeline-compact" id="recentActivity"></div>
        </div>
      </div>
      <div class="dashboard-actions" id="quickActions">
        <button class="btn btn-outline" data-filter="Réceptionné"><i class="fas fa-inbox"></i> Voir réceptionnés</button>
        <button class="btn btn-outline" data-filter="Diagnostic en cours"><i class="fas fa-stethoscope"></i> Voir en diagnostic</button>
        <button class="btn btn-outline" data-filter="Livré"><i class="fas fa-check-circle" style="color:var(--success);"></i> Voir livrés</button>
        <button class="btn btn-outline" id="viewOverdueBtn"><i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i> Voir en retard</button>
      </div>
    </div>
  </div>
</main>

<div id="addModal" class="modal">
  <div class="modal-content"><span class="close">&times;</span><h2>Nouveau véhicule</h2>
    <form id="addForm"><input type="text" id="newPlaque" placeholder="Plaque *" required><input type="text" id="newClient" placeholder="Société *" required><input type="text" id="newModel" placeholder="Modèle"><button type="submit" class="btn">Créer</button></form>
  </div>
</div>

<div id="importModal" class="modal">
  <div class="modal-content"><span class="close">&times;</span><h2>Importer un fichier Excel</h2>
    <p>Sélectionnez un fichier .xlsx ou .xls</p>
    <input type="file" id="fileInput" accept=".xlsx,.xls"><br><br>
    <button id="importConfirmBtn" class="btn">Importer</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/************************************************************
 *  SAV FLEET MANAGER PRO - TABLEAU DE BORD AMÉLIORÉ        *
 ************************************************************/

// ---------- CONFIG ----------
const DEFAULT_POS = { lat:5.3364, lng:-4.0267 };
const ACCESSOIRES = ["Roue de secours", "Cric", "Triangle", "Extincteur", "Trousse de secours", "Gilet jaune", "Manivelle", "Poste radio", "CD", "Radio VHF", "Clé de roue", "Enjoliveurs", "Tapis au sol", "Axe de remorquage"];
const DOCUMENTS = ["Carte grise", "Certificat d'immatriculation", "Attestation assurance", "Permis de conduire", "Carnet d'entretien", "Manuel d'utilisation", "Vignette", "Carte SICTA", "Patente", "Carte de stationnement", "Carte de transport"];

// ---------- ÉTAT ----------
let vehicles = [];
let selectedId = null;
let map = null;
let marker = null;
let darkMode = localStorage.getItem('darkMode') === 'true';

// DOM refs
const listEl = document.getElementById('vehiclesList');
const detailEl = document.getElementById('detailForm');
const placeholderEl = document.getElementById('placeholder');
const searchInput = document.getElementById('searchInput');
const societyFilter = document.getElementById('societyFilter');
const statusFilter = document.getElementById('statusFilter');
const statsContainer = document.getElementById('statsContainer');

// ---------- THÈME ----------
function applyTheme() {
  if (darkMode) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
  }
  localStorage.setItem('darkMode', darkMode);
}
document.getElementById('themeToggle').addEventListener('click', () => {
  darkMode = !darkMode;
  applyTheme();
});
applyTheme();

// ---------- UTILITAIRES ----------
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

function getCoordFromPosGeo(pos) {
  if (!pos) return DEFAULT_POS;
  const l = pos.toLowerCase();
  if (l.includes('aeroport')) return { lat:5.2614, lng:-3.9268 };
  if (l.includes('depot 1')) return { lat:5.3364, lng:-4.0267 };
  if (l.includes('depot 2')) return { lat:5.3411, lng:-4.0211 };
  if (l.includes('garage 2')) return { lat:5.3497, lng:-4.0161 };
  if (l.includes('united motors')) return { lat:5.3542, lng:-4.0089 };
  return DEFAULT_POS;
}

function today() { return new Date().toISOString().slice(0,19).replace('T',' '); }

function parseDate(val) {
  if (!val) return '';
  if (typeof val === 'number' && val > 1000) {
    const d = new Date((val - 25569) * 86400 * 1000);
    return d.toISOString().slice(0,19).replace('T',' ');
  }
  const str = String(val).trim();
  if (str.match(/^\d{4}-\d{2}-\d{2}/)) return str;
  if (str.match(/^\d{2}\/\d{2}\/\d{4}/)) {
    const parts = str.split(/[\/\s]/);
    if (parts.length >= 3) return `${parts[2]}-${parts[1]}-${parts[0]} 00:00:00`;
  }
  return str;
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function getDaysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return Math.floor((Date.now() - d) / (1000*60*60*24));
}

function isOverdue(v) {
  if (v.statut === 'Livré') return false;
  if (!v.dateCreation) return false;
  const days = getDaysSince(v.dateCreation);
  return days !== null && days > 7;
}

function newVehicle(plaque, societe, modele) {
  return {
    id: generateId(),
    societe: societe || "BNETD",
    plaque: plaque.toUpperCase(),
    marque: "",
    modele: modele || "",
    statut: "Réceptionné",
    dateCreation: today(),
    dateLivraison: "",
    referenceCommande: "",
    typeMaintenance: "",
    kilometrage: "",
    chassis: "",
    energie: "Diesel",
    niveauCarburant: "1/2",
    miseEnService: "",
    couleurExterne: "",
    contactChauffeur: "",
    objetVisite: "",
    autresObservations: "",
    proprietaireNom: "",
    proprietaireContact: "",
    chauffeurNom: "",
    chauffeurContact: "",
    transmission: "Manuelle",
    puissance: "",
    finAssurance: "",
    finVignette: "",
    numeroIntervention: "",
    travauxClient: "",
    rapportDiagnostic: "",
    pieces: "",
    positionGeo: "",
    position: DEFAULT_POS,
    adresseTexte: "Abidjan",
    accessoires: [],
    documents: [],
    photos: [],
    history: [{ date: today(), action: "Création du dossier", status: "Réceptionné" }]
  };
}

// ---------- SAUVEGARDE ----------
function save() { localStorage.setItem('fleet_data', JSON.stringify(vehicles)); }

function loadFromStorage() {
  const raw = localStorage.getItem('fleet_data');
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) {
        vehicles = parsed.map(v => ({ ...newVehicle('','',''), ...v, accessoires: v.accessoires||[], documents: v.documents||[], photos: v.photos||[], history: v.history||[] }));
        return true;
      }
    } catch(e) {}
  }
  return false;
}

// ---------- RENDU LISTE ----------
function renderList() {
  const filterText = searchInput.value.toLowerCase();
  const filterSociety = societyFilter.value;
  const filterStatus = statusFilter.value;
  let filtered = vehicles.filter(v => {
    const matchText = v.plaque.toLowerCase().includes(filterText) || 
                      v.societe.toLowerCase().includes(filterText) || 
                      v.marque.toLowerCase().includes(filterText) || 
                      v.modele.toLowerCase().includes(filterText);
    const matchSociety = filterSociety === 'all' || v.societe === filterSociety;
    const matchStatus = filterStatus === 'all' || v.statut === filterStatus;
    return matchText && matchSociety && matchStatus;
  });
  if (!filtered.length) { 
    listEl.innerHTML = '<div class="placeholder">Aucun véhicule enregistré.</div>'; 
    return; 
  }
  listEl.innerHTML = filtered.map(v => {
    const overdue = isOverdue(v);
    const dotClass = v.statut === 'Réceptionné' ? 'receptionne' : v.statut === 'Diagnostic en cours' ? 'diagnostic' : 'livre';
    return `
    <div class="card ${selectedId === v.id ? 'selected' : ''}" data-id="${v.id}">
      <h4>${escapeHtml(v.plaque)} - ${escapeHtml(v.societe)}</h4>
      <p><span class="status-dot ${dotClass}"></span>${escapeHtml(v.marque)} ${escapeHtml(v.modele)} • ${v.statut}</p>
      <span class="badge">${v.dateCreation?.split(' ')[0] || ''}</span>
      ${v.photos?.length ? `<span class="badge"><i class="fas fa-camera"></i> ${v.photos.length}</span>` : ''}
      ${overdue ? `<span class="badge badge-alert"><i class="fas fa-exclamation-triangle"></i> En retard</span>` : ''}
    </div>
  `}).join('');
  
  listEl.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', function() {
      selectVehicle(this.dataset.id);
    });
  });
  updateSocietyFilter();
}

function updateSocietyFilter() {
  const societies = [...new Set(vehicles.map(v => v.societe))].sort();
  const current = societyFilter.value;
  societyFilter.innerHTML = '<option value="all">Toutes sociétés</option>' + societies.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
  societyFilter.value = current;
}

// ---------- SÉLECTION ----------
function selectVehicle(id) {
  const v = vehicles.find(v => v.id === id);
  if (!v) {
    detailEl.style.display = 'none';
    placeholderEl.style.display = 'block';
    selectedId = null;
    renderList();
    return;
  }
  selectedId = id;
  renderList();
  showDetail(v);
}

// ---------- CARTE ----------
function initMap(pos) {
  if (map) { map.remove(); map = null; }
  if (marker) { marker.remove(); marker = null; }
  const lat = pos?.lat || DEFAULT_POS.lat;
  const lng = pos?.lng || DEFAULT_POS.lng;
  map = L.map('mapContainer').setView([lat,lng], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap' }).addTo(map);
  marker = L.marker([lat,lng], { draggable:true }).addTo(map);
  marker.on('dragend', () => {
    const p = marker.getLatLng();
    updatePosition(selectedId, { lat:p.lat, lng:p.lng });
  });
}

function updatePosition(id, coords) {
  const v = vehicles.find(v => v.id === id);
  if (!v) return;
  v.position = coords;
  save();
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${coords.lat}&lon=${coords.lng}&zoom=18`)
    .then(r => r.json())
    .then(d => { if (d.display_name) { v.adresseTexte = d.display_name.substring(0,100); save(); } })
    .catch(()=>{});
}

function getCurrentPos(id) {
  if (!navigator.geolocation) return alert('Géolocalisation non supportée');
  navigator.geolocation.getCurrentPosition(p => {
    const coords = { lat:p.coords.latitude, lng:p.coords.longitude };
    updatePosition(id, coords);
    if (marker) marker.setLatLng(coords);
    if (map) map.setView([coords.lat, coords.lng], 12);
  }, () => alert('Position refusée'));
}

function handlePhotos(id, files) {
  const v = vehicles.find(v => v.id === id);
  if (!v) return;
  Array.from(files).forEach(f => {
    const r = new FileReader();
    r.onload = e => {
      v.photos.push(e.target.result);
      save();
      const preview = document.getElementById('photoPreview');
      if (preview) {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.style.maxWidth = '70px';
        preview.appendChild(img);
      }
    };
    r.readAsDataURL(f);
  });
}

// ---------- SAUVEGARDE VÉHICULE ----------
function saveVehicle(id) {
  const v = vehicles.find(v => v.id === id);
  if (!v) { alert('Véhicule introuvable'); return; }
  
  const oldStatus = v.statut;
  
  v.statut = document.getElementById('fStatus').value;
  v.dateCreation = document.getElementById('fCreation').value?.replace('T',' ') || '';
  v.dateLivraison = document.getElementById('fLivraison').value?.replace('T',' ') || '';
  v.societe = document.getElementById('fSociete').value;
  v.plaque = document.getElementById('fPlaque').value;
  v.marque = document.getElementById('fMarque').value;
  v.modele = document.getElementById('fModele').value;
  v.referenceCommande = document.getElementById('fRefCommande').value;
  v.typeMaintenance = document.getElementById('fTypeMaintenance').value;
  v.kilometrage = document.getElementById('fKm').value;
  v.chassis = document.getElementById('fChassis').value;
  v.energie = document.getElementById('fEnergie').value;
  v.niveauCarburant = document.getElementById('fCarburant').value;
  v.miseEnService = document.getElementById('fMiseService').value;
  v.couleurExterne = document.getElementById('fCouleurExterne').value;
  v.contactChauffeur = document.getElementById('fContactChauffeur').value;
  v.objetVisite = document.getElementById('fObjetVisite').value;
  v.autresObservations = document.getElementById('fAutresObs').value;
  v.positionGeo = document.getElementById('fPositionGeo').value;
  v.accessoires = Array.from(document.querySelectorAll('.acc-cb:checked')).map(cb => cb.value);
  v.documents = Array.from(document.querySelectorAll('.doc-cb:checked')).map(cb => cb.value);

  if (oldStatus !== v.statut) {
    if (!v.history) v.history = [];
    v.history.push({ date: today(), action: `Changement statut : ${oldStatus} → ${v.statut}`, status: v.statut });
  }

  save();
  renderList();
  showDetail(v);
  alert('✅ Enregistré !');
}

function deleteVehicle(id) {
  if (!confirm('Supprimer définitivement ce véhicule ?')) return;
  vehicles = vehicles.filter(v => v.id !== id);
  if (selectedId === id) { 
    selectedId = null; 
    detailEl.style.display='none'; 
    placeholderEl.style.display='block'; 
  }
  save();
  renderList();
}

// ---------- AJOUT ----------
function addVehicle(plaque, societe, modele) {
  const v = newVehicle(plaque, societe, modele);
  vehicles.push(v);
  save();
  renderList();
  selectVehicle(v.id);
}

// ---------- SAUVEGARDE JSON ----------
function backupJSON() {
  const blob = new Blob([JSON.stringify(vehicles, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sauvegarde_fleet_${new Date().toISOString().slice(0,19)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function restoreJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    const r = new FileReader();
    r.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!Array.isArray(parsed)) throw new Error();
        vehicles = parsed.map(v => ({ ...newVehicle('','',''), ...v, accessoires: v.accessoires||[], documents: v.documents||[], photos: v.photos||[], history: v.history||[] }));
        save();
        renderList();
        alert('Restauration réussie');
      } catch(err) { alert('Fichier invalide'); }
    };
    r.readAsText(file);
  };
  input.click();
}

// ---------- IMPORT EXCEL ----------
function importExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type:'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);
      if (!json.length) { alert('Fichier vide'); return; }
      let imported = 0;

      const map = {
        societe: 'Client',
        dateCreation: 'Date de création',
        dateLivraison: 'Date de Livraison',
        plaque: 'Immatriculation',
        marque: 'Marque',
        modele: 'Modele',
        referenceCommande: 'Référence de commande',
        typeMaintenance: 'Type de Maintenance',
        kilometrage: 'Kilométrage',
        chassis: 'N° Châssis',
        energie: 'Energie',
        niveauCarburant: 'Niveau de carburant',
        miseEnService: 'Mise en Service',
        couleurExterne: 'Couleur(Externe)',
        contactChauffeur: 'Contact Chauffeur Déposant',
        objetVisite: 'Objet de la visite',
        autresObservations: 'Autres observations'
      };

      json.forEach(row => {
        const get = (key) => {
          const colName = map[key];
          if (!colName) return '';
          if (row[colName] !== undefined) return row[colName];
          const found = Object.keys(row).find(k => k.toLowerCase().trim() === colName.toLowerCase().trim());
          return found ? row[found] : '';
        };

        const plaque = get('plaque')?.toString().trim() || '';
        if (!plaque) return;

        const v = newVehicle(plaque, 'BNETD', '');
        v.societe = get('societe')?.toString().trim() || 'BNETD';
        v.marque = get('marque')?.toString().trim() || '';
        v.modele = get('modele')?.toString().trim() || '';
        v.dateCreation = parseDate(get('dateCreation')) || today();
        v.dateLivraison = parseDate(get('dateLivraison')) || '';
        v.referenceCommande = get('referenceCommande')?.toString().trim() || '';
        v.typeMaintenance = get('typeMaintenance')?.toString().trim() || '';
        v.kilometrage = get('kilometrage')?.toString().trim() || '';
        v.chassis = get('chassis')?.toString().trim() || '';
        v.energie = get('energie')?.toString().trim() || 'Diesel';
        v.niveauCarburant = get('niveauCarburant')?.toString().trim() || '1/2';
        v.miseEnService = parseDate(get('miseEnService')) || '';
        v.couleurExterne = get('couleurExterne')?.toString().trim() || '';
        v.contactChauffeur = get('contactChauffeur')?.toString().trim() || '';
        v.objetVisite = get('objetVisite')?.toString().trim() || '';
        v.autresObservations = get('autresObservations')?.toString().trim() || '';
        v.travauxClient = v.objetVisite;

        vehicles.push(v);
        imported++;
      });

      if (imported) {
        save();
        renderList();
        alert(`${imported} véhicules importés avec succès.`);
      } else {
        alert('Aucun véhicule importé.');
      }
    } catch(err) {
      alert('Erreur : ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ---------- TABLEAU DE BORD AMÉLIORÉ ----------
function renderDashboard() {
  const total = vehicles.length;
  const statusCount = { 'Réceptionné':0, 'Diagnostic en cours':0, 'Livré':0 };
  vehicles.forEach(v => { 
    if (statusCount[v.statut] !== undefined) statusCount[v.statut]++; 
    else statusCount[v.statut] = 1;
  });
  const pending = vehicles.filter(v => v.statut !== 'Livré' && (!v.dateLivraison || v.dateLivraison === ''));
  const overdue = vehicles.filter(v => isOverdue(v));
  const avgDays = vehicles.filter(v => v.dateCreation).map(v => {
    const d = new Date(v.dateCreation);
    return Math.floor((Date.now() - d) / (1000*60*60*24));
  });
  const avg = avgDays.length ? (avgDays.reduce((a,b)=>a+b,0)/avgDays.length).toFixed(0) : 0;

  // Stats cards avec icônes et couleurs
  const colors = {
    'Réceptionné': { icon: 'fa-inbox', color: 'var(--primary)', bg: 'var(--primary-light)' },
    'Diagnostic en cours': { icon: 'fa-stethoscope', color: 'var(--info)', bg: '#bee3f8' },
    'Livré': { icon: 'fa-check-circle', color: 'var(--success)', bg: '#c6f6d5' }
  };

  let statsHtml = '';
  for (const [status, count] of Object.entries(statusCount)) {
    const c = colors[status] || { icon: 'fa-circle', color: 'var(--text-light)', bg: 'var(--badge-bg)' };
    statsHtml += `
      <div class="stat-card-clickable" data-filter="${status}">
        <span class="stat-icon" style="color:${c.color}"><i class="fas ${c.icon}"></i></span>
        <span class="stat-number">${count}</span>
        <span class="stat-label">${status}</span>
      </div>
    `;
  }

  statsHtml += `
    <div class="stat-card-clickable" id="overdueCard">
      <span class="stat-icon" style="color:var(--danger)"><i class="fas fa-exclamation-triangle"></i></span>
      <span class="stat-number">${overdue.length}</span>
      <span class="stat-label">En retard (>7j)</span>
      <span class="stat-sub">Délai moyen ${avg} jours</span>
    </div>
    <div class="stat-card-clickable" id="pendingCard">
      <span class="stat-icon" style="color:var(--warning)"><i class="fas fa-clock"></i></span>
      <span class="stat-number">${pending.length}</span>
      <span class="stat-label">Non livrés</span>
      <span class="stat-sub">Total ${total} véhicules</span>
    </div>
  `;
  statsContainer.innerHTML = statsHtml;

  // Événements clic sur les cartes stats
  document.querySelectorAll('.stat-card-clickable[data-filter]').forEach(el => {
    el.addEventListener('click', function() {
      const status = this.dataset.filter;
      // Basculer vers l'onglet liste et filtrer
      document.querySelector('[data-tab="list"]').click();
      statusFilter.value = status;
      statusFilter.dispatchEvent(new Event('change'));
    });
  });
  document.getElementById('overdueCard').addEventListener('click', () => {
    document.querySelector('[data-tab="list"]').click();
    // Filtrer les véhicules en retard (pas de filtre direct, on va chercher)
    // On applique un filtre personnalisé
    searchInput.value = '';
    statusFilter.value = 'all';
    renderList();
    // Mettre en évidence les véhicules en retard (déjà fait via le badge)
  });
  document.getElementById('pendingCard').addEventListener('click', () => {
    document.querySelector('[data-tab="list"]').click();
    statusFilter.value = 'all';
    searchInput.value = '';
    renderList();
    // On affiche un message dans la console
    alert(`🔍 ${vehicles.filter(v => v.statut !== 'Livré' && (!v.dateLivraison || v.dateLivraison === '')).length} véhicules non livrés. Utilisez le filtre pour les afficher.`);
  });

  // Graphique à barres
  const statusBarsContainer = document.getElementById('statusBars');
  const maxCount = Math.max(1, ...Object.values(statusCount));
  const barColors = {
    'Réceptionné': 'orange',
    'Diagnostic en cours': 'blue',
    'Livré': 'green'
  };
  let barsHtml = '';
  for (const [status, count] of Object.entries(statusCount)) {
    const pct = maxCount > 0 ? (count / maxCount * 100) : 0;
    const color = barColors[status] || 'purple';
    barsHtml += `
      <div class="chart-bar-row">
        <span class="chart-bar-label">${status}</span>
        <div class="chart-bar-track">
          <div class="chart-bar-fill ${color}" style="width:${Math.max(10, pct)}%;">
            ${count}
          </div>
        </div>
      </div>
    `;
  }
  statusBarsContainer.innerHTML = barsHtml;

  // Dernières activités (historique des 5 dernières actions)
  const activityContainer = document.getElementById('recentActivity');
  const allHistory = [];
  vehicles.forEach(v => {
    if (v.history) {
      v.history.forEach(h => {
        allHistory.push({ ...h, plaque: v.plaque, societe: v.societe });
      });
    }
  });
  allHistory.sort((a,b) => new Date(b.date) - new Date(a.date));
  const recent = allHistory.slice(0, 8);
  let activityHtml = '';
  if (recent.length) {
    recent.forEach(h => {
      const date = h.date?.split(' ')[0] || '';
      activityHtml += `
        <div class="item">
          <span class="date">${date}</span>
          <span class="label">${escapeHtml(h.plaque)} - ${escapeHtml(h.action)}</span>
        </div>
      `;
    });
  } else {
    activityHtml = '<div class="item"><span class="label">Aucune activité récente</span></div>';
  }
  activityContainer.innerHTML = activityHtml;

  // Actions rapides
  document.querySelectorAll('#quickActions .btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', function() {
      const filter = this.dataset.filter;
      document.querySelector('[data-tab="list"]').click();
      statusFilter.value = filter;
      statusFilter.dispatchEvent(new Event('change'));
    });
  });
  document.getElementById('viewOverdueBtn').addEventListener('click', () => {
    document.querySelector('[data-tab="list"]').click();
    searchInput.value = '';
    statusFilter.value = 'all';
    renderList();
    // On va mettre en surbrillance les véhicules en retard via un message
    const overdueList = vehicles.filter(v => isOverdue(v));
    if (overdueList.length) {
      alert(`🔴 ${overdueList.length} véhicules en retard (plus de 7 jours).\n${overdueList.map(v => `- ${v.plaque} (${v.statut})`).join('\n')}`);
    } else {
      alert('✅ Aucun véhicule en retard.');
    }
  });
}

// ---------- GESTION ONGLETS ----------
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    const target = document.getElementById('tab-' + this.dataset.tab);
    if (target) target.classList.add('active');
    if (this.dataset.tab === 'dashboard') {
      renderDashboard();
    }
  });
});

// ---------- ÉVÉNEMENTS ----------
document.getElementById('addBtn').addEventListener('click', () => document.getElementById('addModal').style.display='flex');
document.getElementById('addModal').querySelector('.close').addEventListener('click', () => document.getElementById('addModal').style.display='none');
window.addEventListener('click', e => { if (e.target.classList.contains('modal')) e.target.style.display='none'; });
document.getElementById('addForm').addEventListener('submit', e => {
  e.preventDefault();
  const plaque = document.getElementById('newPlaque').value.trim();
  const societe = document.getElementById('newClient').value.trim();
  const modele = document.getElementById('newModel').value.trim();
  if (!plaque || !societe) { alert('Plaque et société requis'); return; }
  addVehicle(plaque, societe, modele);
  document.getElementById('addModal').style.display='none';
  document.getElementById('addForm').reset();
});

document.getElementById('excelBtn').addEventListener('click', exportExcel);
document.getElementById('pdfBtn').addEventListener('click', exportPdf);
document.getElementById('backupBtn').addEventListener('click', backupJSON);
document.getElementById('restoreBtn').addEventListener('click', restoreJSON);
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importModal').style.display='flex');
document.getElementById('importModal').querySelector('.close').addEventListener('click', () => document.getElementById('importModal').style.display='none');
document.getElementById('importConfirmBtn').addEventListener('click', () => {
  const fileInput = document.getElementById('fileInput');
  if (!fileInput.files.length) { alert('Sélectionnez un fichier'); return; }
  importExcel(fileInput.files[0]);
  document.getElementById('importModal').style.display='none';
  fileInput.value = '';
});

searchInput.addEventListener('input', renderList);
societyFilter.addEventListener('change', renderList);
statusFilter.addEventListener('change', renderList);

// ---------- DÉMARRAGE ----------
if (!loadFromStorage()) {
  save();
}
renderList();
</script>
</body>
</html>
